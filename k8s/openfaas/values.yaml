# Helm values for the openfaas/openfaas chart
# Repo: https://openfaas.github.io/faas-netes/
#
# Optimized for a K3s cluster on 2 GCP e2-small VMs.
# Prometheus/Alertmanager disabled to save resources.

# --- Authentication -----------------------------------------------------------
# Automatically generates a basic-auth secret (user: admin, password: random).
# Retrieve the password after install:
#   kubectl get secret -n openfaas basic-auth \
#     -o jsonpath="{.data.basic-auth-password}" | base64 -d
generateBasicAuth: true

# --- Namespaces -------------------------------------------------------------
functionNamespace: openfaas-fn

# --- Gateway ----------------------------------------------------------------
gateway:
  replicas: 1
  # Timeouts: upstreamTimeout must be < readTimeout/writeTimeout
  readTimeout: "65s"
  writeTimeout: "65s"
  upstreamTimeout: "60s"
  # Disables internal gateway->function TLS (handled by Traefik at the entry point)
  directFunctions: true

# --- faas-netes controller (standard mode, no CRD operator) -----------------
operator:
  create: false

faasnetes:
  imagePullPolicy: "Always"

# --- Monitoring (disabled on small cluster) ----------------------------------
# Re-enable if alerts or Grafana dashboards are needed.
alertmanager:
  create: false

prometheus:
  create: false

# --- Automatic scaling --------------------------------------------------------
# Min replicas = 0 enables scale-to-zero (resource savings).
# Functions start in ~2s on the first call.
faasIdler:
  create: true
  inactivityDuration: "5m"
  reconcileInterval: "30s"
