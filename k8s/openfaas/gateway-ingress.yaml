# Traefik Ingress for the OpenFaaS gateway
# K3s bundles Traefik v2 — no additional installation required.
#
# Domain managed via Cloudflare: create an A record pointing to the
# external IP of the GCP node, with the Cloudflare proxy enabled (orange cloud).
#
# Replace openfaas.cofrap.example.com with the chosen subdomain,
# e.g.: openfaas.cofrap.example.com
#
# Cloudflare TLS mode:
#   - Flexible (default): Cloudflare <-> cluster over HTTP -> no TLS config needed here
#   - Full / Full Strict: Cloudflare <-> cluster over HTTPS -> uncomment the
#     tls: section below and install cert-manager (see README step 3)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openfaas-gateway
  namespace: openfaas
  annotations:
    # kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.middlewares: openfaas-cors-headers@kubernetescrd
    # Enable only in Cloudflare Full/Full Strict mode (HTTPS to the origin)
    # traefik.ingress.kubernetes.io/router.entrypoints: websecure
    # traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
    - host: openfaas.k3s.homelab
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
  # Uncomment in Cloudflare Full Strict mode with cert-manager:
  # tls:
  #   - hosts:
  #       - openfaas.cofrap.example.com
  #     secretName: openfaas-gateway-tls
