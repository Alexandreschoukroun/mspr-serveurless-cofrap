# Helm values for the bitnami/postgresql chart
# Repo: https://charts.bitnami.com/bitnami
#
# Deploys PostgreSQL 16 in the openfaas-fn namespace so the functions
# can reach it via the internal DNS name: postgresql.openfaas-fn.svc.cluster.local

# --- Authentication -----------------------------------------------------------
# IMPORTANT: replace all <...> values before deploying,
# then store the passwords in the db-credentials K8s secret (see secrets/).
auth:
  postgresPassword: "chagemedev"
  username: "cofrapuser"
  password: "changemedev"
  database: "cofrapdb"

# --- Primary node -----------------------------------------------------------
primary:
  persistence:
    enabled: true
    size: 2Gi
    # storageClass: "" # leave empty to use K3s's default StorageClass (local-path)

  # Initial schema: run ONLY ONCE when the PostgreSQL pod is created.
  # Creates the users table used by the three COFRAP functions.
  initdb:
    scripts:
      01-schema.sql: |
        CREATE TABLE IF NOT EXISTS users (
            id        SERIAL       PRIMARY KEY,
            username  VARCHAR(100) UNIQUE NOT NULL,
            password  TEXT         NOT NULL,
            mfa       TEXT         DEFAULT '',
            gendate   BIGINT       DEFAULT 0,
            expired   SMALLINT     DEFAULT 0
        );

  # Resources sized for an e2-small node (~2 GB RAM)
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# --- Readiness / liveness ---------------------------------------------------
# Bitnami default values kept as-is — no override needed.
