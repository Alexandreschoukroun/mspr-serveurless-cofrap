name: CI — generate-password

# Triggered on every push or PR to these branches
on:
  push:
    branches:
      - main
      - feat/generate-password
  pull_request:
    branches:
      - main
  workflow_dispatch:
    

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checks out the repo code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Installs Python 3.11
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Installs the function's dependencies
      - name: Install dependencies
        run: pip install -r functions/generate-password/requirements.txt

      # 4. Runs the local test (mock DB — no need for PostgreSQL)
      - name: Run tests
        run: python functions/generate-password/test_local.py
