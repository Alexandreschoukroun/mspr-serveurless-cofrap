name: Build & Deploy OpenFaaS

on:
  push:
    branches: [main]
  workflow_dispatch:
    

env:
  REGISTRY: ghcr.io

jobs:
  # ── Build + Push ────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push images
    runs-on: arc-runner-set-cofrap
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install faas-cli
        run: |
          if [ -x k8s/faas-cli ]; then
            sudo cp k8s/faas-cli /usr/local/bin/faas-cli
          else
            curl -sSL https://cli.openfaas.com | sudo sh
          fi

      - name: Pull python3-http template
        run: faas-cli template store pull python3-http

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: Alexandreschoukroun
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images
        run: faas-cli build -f stack.yml

      - name: Push images
        run: faas-cli push -f stack.yml

      - name: Build frontend image
        run: docker build -t ghcr.io/alexandreschoukroun/cofrap-frontend:latest frontend/

      - name: Push frontend image
        run: docker push ghcr.io/alexandreschoukroun/cofrap-frontend:latest

  # ── Deploy ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to OpenFaaS
    runs-on: arc-runner-set-cofrap
    needs: build-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install faas-cli
        run: |
          if [ -x k8s/faas-cli ]; then
            sudo cp k8s/faas-cli /usr/local/bin/faas-cli
          else
            curl -sSL https://cli.openfaas.com | sudo sh
          fi

      - name: Pull python3-http template
        run: faas-cli template store pull python3-http

      - name: Login to OpenFaaS gateway
        env:
          OPENFAAS_URL: ${{ secrets.OPENFAAS_URL }}
          OPENFAAS_PASSWORD: ${{ secrets.OPENFAAS_PASSWORD }}
        run: |
          faas-cli login \
            --username admin \
            --password "$OPENFAAS_PASSWORD" \
            --gateway "$OPENFAAS_URL"

      - name: Deploy functions
        env:
          OPENFAAS_URL: ${{ secrets.OPENFAAS_URL }}
        run: |
          faas-cli deploy -f stack.yml \
            --gateway "$OPENFAAS_URL"

  # ── Deploy Frontend ──────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend to k3s
    runs-on: arc-runner-set-cofrap
    needs: build-push
    environment: production
    container:
      image: bitnami/kubectl:latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "${{ secrets.KUBECONFIG }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy frontend to k3s
        run: |
          kubectl apply -f k8s/frontend/namespace.yaml
          kubectl apply -f k8s/frontend/configmap.yaml
          kubectl apply -f k8s/frontend/deployment.yaml
          kubectl apply -f k8s/frontend/ingress.yaml
          kubectl rollout status deploy/cofrap-frontend -n cofrap --timeout=120s
